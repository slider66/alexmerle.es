name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*.{ts,tsx}') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Verify static output exists
        run: |
          if [ ! -d "./out" ]; then
            echo "❌ ERROR: La carpeta ./out no existe. El build no generó export estático."
            echo "Asegúrate de que next.config.ts tiene output: 'export'."
            exit 1
          fi
          echo "✅ Carpeta ./out encontrada ($(ls ./out | wc -l) archivos/carpetas)"

      # Subir assets con hash primero (_next/static) para que los HTML los encuentren al actualizarse
      - name: Deploy static assets via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./
          timeout: 60000
          include: |
            _next/**

      # Subir HTML y resto de archivos una vez los assets ya están en el servidor
      - name: Deploy HTML and remaining files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./
          timeout: 60000
          exclude: |
            **/.git*
            **/.git*/**
            _next/**
