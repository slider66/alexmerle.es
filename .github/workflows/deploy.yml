name: Deploy to Hostinger

# Deploy: GitHub Actions construye y sube via lftp a Hostinger.
# Hostinger CI/CD (autoimplementación) debe estar DESACTIVADO para evitar conflictos.
# Ver CLAUDE.md sección "Deploy" para detalles y configuración.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Verify static output
        run: |
          if [ ! -d "./out" ]; then
            echo "❌ ./out no existe — asegúrate de que next.config.ts tiene output: 'export'"
            exit 1
          fi
          CSS_COUNT=$(find ./out/_next/static -name "*.css" 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -eq 0 ]; then
            echo "❌ No se encontró CSS en ./out/_next/static/"
            exit 1
          fi
          echo "✅ ./out OK — $(ls ./out | wc -l) entradas, ${CSS_COUNT} CSS"

      - name: Install lftp
        run: sudo apt-get install -y lftp -q

      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # netrc: soporta caracteres especiales en usuario/contraseña
          printf 'machine %s login %s password %s\n' "$FTP_SERVER" "$FTP_USER" "$FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc

          # ftps:// = implicit TLS (puerto 990). Config mínima para Hostinger shared hosting.
          # Las directivas 'set' deben ir ANTES de 'open' — por eso se usa fichero con -f.
          # printf en lugar de heredoc para evitar problemas de indentación en YAML.
          printf '%s\n' \
            "set ssl:verify-certificate no" \
            "set ftp:passive-mode yes" \
            "set net:timeout 60" \
            "set net:max-retries 3" \
            "set net:reconnect-interval-base 5" \
            "open ftps://$FTP_SERVER" \
            "mirror --reverse --delete-last --parallel=1 --verbose ./out/ /" \
            "quit" > /tmp/lftp-deploy.sh

          lftp -f /tmp/lftp-deploy.sh
          rm -f ~/.netrc /tmp/lftp-deploy.sh

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://webpc.es)
          echo "ℹ️ / → $HTTP_STATUS"
          DOSSIER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://webpc.es/dossier/propuesta)
          echo "ℹ️ /dossier/propuesta → $DOSSIER_STATUS"
          COLAB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://webpc.es/dossier/colaboradores)
          echo "ℹ️ /dossier/colaboradores → $COLAB_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ Site principal devolvió $HTTP_STATUS"
          else
            echo "✅ Smoke test OK"
          fi
