name: Deploy to Hostinger

# Deploy: GitHub Actions construye y sube via FTP a Hostinger.
# Hostinger CI/CD (autoimplementación) debe estar DESACTIVADO para evitar conflictos.
# Ver CLAUDE.md sección "Deploy" para detalles y configuración.
#
# Estrategia de deploy en dos pasos:
# 1. FTP-Deploy-Action (incremental) — sube solo los archivos cambiados usando state file.
#    No incrementar state-name salvo que sea estrictamente necesario (fuerza subida completa
#    y puede causar ETIMEDOUT si out/ es grande).
# 2. lftp (forzado) — sube /dossier/ siempre, independientemente del state.
#    Las páginas de dossier son pocas y ligeras; subirlas siempre evita el problema
#    de que el state file las marque como subidas cuando en realidad no lo están.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Verify static output
        run: |
          if [ ! -d "./out" ]; then
            echo "❌ ./out no existe — asegúrate de que next.config.ts tiene output: 'export'"
            exit 1
          fi
          CSS_COUNT=$(find ./out/_next/static -name "*.css" 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -eq 0 ]; then
            echo "❌ No se encontró CSS en ./out/_next/static/"
            exit 1
          fi
          echo "✅ ./out OK — $(ls ./out | wc -l) entradas, ${CSS_COUNT} CSS"

      - name: Deploy via FTP (incremental)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          server-dir: ./
          timeout: 600000
          # NO incrementar este número salvo causa justificada — fuerza subida completa
          # y provoca ETIMEDOUT. El deploy incremental es suficiente para cambios normales.
          state-name: .ftp-deploy-sync-state-v5.json
          exclude: |
            **/.git*
            **/.git*/**
            **/dossier/**

      - name: Deploy /dossier/ via lftp (forzado, siempre)
        run: |
          sudo apt-get install -y lftp -q
          lftp -e "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            mirror --reverse --delete --verbose ./out/dossier/ /dossier/;
            put ./out/dossier/propuesta.html -o /dossier/propuesta.html;
            put ./out/dossier/colaboradores.html -o /dossier/colaboradores.html;
            quit
          " -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" ftp://${{ secrets.FTP_SERVER }}

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ Smoke test: https://alexmerle.es devolvió $HTTP_STATUS"
          else
            echo "✅ Smoke test OK — site devuelve 200"
          fi
          DOSSIER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es/dossier/propuesta)
          echo "ℹ️ /dossier/propuesta → $DOSSIER_STATUS"
          COLAB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es/dossier/colaboradores)
          echo "ℹ️ /dossier/colaboradores → $COLAB_STATUS"
