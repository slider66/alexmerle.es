name: Deploy to Hostinger

# Deploy: GitHub Actions construye y sube via lftp a Hostinger.
# Hostinger CI/CD (autoimplementación) debe estar DESACTIVADO para evitar conflictos.
# Ver CLAUDE.md sección "Deploy" para detalles y configuración.

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Verify static output
        run: |
          if [ ! -d "./out" ]; then
            echo "❌ ./out no existe — asegúrate de que next.config.ts tiene output: 'export'"
            exit 1
          fi
          CSS_COUNT=$(find ./out/_next/static -name "*.css" 2>/dev/null | wc -l)
          if [ "$CSS_COUNT" -eq 0 ]; then
            echo "❌ No se encontró CSS en ./out/_next/static/"
            exit 1
          fi
          echo "✅ ./out OK — $(ls ./out | wc -l) entradas, ${CSS_COUNT} CSS"

      - name: Install lftp
        run: sudo apt-get install -y lftp -q

      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow yes;
            set ftp:ssl-force yes;
            set ssl:verify-certificate no;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set ftp:passive-mode yes;
            open -u $FTP_USER,$FTP_PASS ftp://$FTP_SERVER;
            mirror --reverse --delete --parallel=4 --verbose ./out/ /;
            quit
          "

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 20
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es)
          echo "ℹ️ / → $HTTP_STATUS"
          DOSSIER_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es/dossier/propuesta)
          echo "ℹ️ /dossier/propuesta → $DOSSIER_STATUS"
          COLAB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://alexmerle.es/dossier/colaboradores)
          echo "ℹ️ /dossier/colaboradores → $COLAB_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "⚠️ Site principal devolvió $HTTP_STATUS"
          else
            echo "✅ Smoke test OK"
          fi
